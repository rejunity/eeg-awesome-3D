# Default runtime configuration for eegvis.
# Override with a user YAML passed via `python -m eegvis run --config my.yaml`.
# CLI flags take precedence over both.

server:
  host: 127.0.0.1
  port: 8765
  open_browser: true
  # Exit when the browser tab closes (last WebSocket client disconnects and
  # doesn't reconnect within idle_shutdown_grace seconds).
  exit_on_browser_close: true
  idle_shutdown_grace: 3.0

stream:
  # Stream discovery filters. Leave name/source null to auto-pick.
  type: EEG
  name: null
  source_id: null
  # Prefer a stream whose name contains this substring when none is specified.
  prefer_name_contains: cgx
  # Seconds to wait for a stream before falling back / reporting.
  resolve_timeout: 5.0
  # Fall back to synthetic data if no stream is found (also set by --synthetic).
  synthetic_fallback: false
  # Remap raw stream channel labels to standard 10-20/10-10 names so the 3D
  # positions, region sort and per-lobe power all line up. Keys are the labels
  # your stream reports (case/space-insensitive); values are canonical names.
  # channel_map:
  #   EEG1: Fp1
  #   EEG2: Fp2
  #   E29: Cz
  # Or keep the map in a separate file (YAML/JSON object, or CSV/TSV rows
  # "raw,canonical"); inline entries above override it. Also settable with
  # `--channel-map FILE`. See eegvis/assets/channel_map.example.yaml.
  channel_map: {}
  channel_map_file: null

processing:
  # Rate at which processed frames are broadcast to browsers.
  output_hz: 30
  # Sliding window of recent samples that processors read from (seconds).
  rolling_window_seconds: 10.0
  # Global processor run cadence (applies to ALL processors):
  #   realtime | per-sample -> run every tick that has new samples
  #   frequency             -> run at most run_hz times per second (cheaper)
  run_mode: realtime
  run_hz: 30
  # Common Average Reference (spatial), built-in head of the filter chain; on by
  # default and toggled live from the GUI. Removes the cross-channel mean.
  car: true
  # The global filter chain (signal -> signal) that produces the `filtered`
  # window driving the trace, electrodes AND extractors. The built-in
  # car -> notch -> bandpass front-end is always present and controlled live from
  # the GUI ("Filters (global)"); the band selector (none/alpha/.../custom) sets
  # the bandpass (custom low > high rejects the band). List EXTRA filters here to
  # append after the front-end:
  filters: []
  #
  # Feature extractors: pure functions of the window, an order-independent
  # fan-out that populates the band / FFT / features display panes. Each may pick
  # its input window with `input: raw|filtered` (default filtered).
  processors:
    - {name: band_power}        # absolute bands + relative power + ratios
    - {name: band_envelope}     # Hilbert amplitude per band
    - {name: hjorth}            # activity / mobility / complexity
    - {name: line_length}
    - {name: spectral_entropy}
    - {name: aperiodic}         # 1/f slope + offset
    - {name: asymmetry}         # per-channel + per-lobe L/R asymmetry
    - {name: region_power}      # per-lobe band power (region x band)
    - {name: fft}               # 128-bin spectrum (input: filtered by default)
    # - {name: short_fourier}   # Unity visual-parity oscillators
    # - {name: normalization}   # moving min/max or z-score `normalized`
    # - {name: smoothing, alpha: 0.25}

synthetic:
  channel_count: 37        # match a CGX Quick32r stream
  sample_rate: 250.0
  # Sine components (Hz) mixed into every channel, plus per-channel phase offsets.
  frequencies: [6, 10, 20, 40]
  amplitudes: [1.0, 0.8, 0.5, 0.3]
  noise: 0.15
  blink_artifacts: true
  # Common-mode mains hum (to demonstrate the notch / CAR). Injected by the
  # engine into whatever source is active — synthetic OR a real LSL stream.
  # mains_amplitude is a fraction of the signal's own std, so it is visible at
  # any unit scale (unit synthetic data or microvolt EEG). Off by default;
  # toggle live from the GUI "Debug" pane.
  mains_hum: false
  mains_hz: 50.0
  mains_amplitude: 0.6
