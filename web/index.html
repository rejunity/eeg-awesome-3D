<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EEG Awesome 3D</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #05070d; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      #hud {
        position: fixed; bottom: 38px; left: 12px; z-index: 10;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px; color: #cdd6f4; pointer-events: none;
        background: rgba(10,14,24,0.55); padding: 8px 10px; border-radius: 6px;
        line-height: 1.5; backdrop-filter: blur(4px);
      }
      #hud .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
        background:#f38ba8; margin-right:6px; }
      #hud.connected .dot { background:#a6e3a1; }
      #help {
        position: fixed; bottom: 12px; left: 12px; z-index: 10;
        font-family: ui-monospace, monospace; font-size: 11px; color: #7f849c;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"><span class="dot"></span><span id="status">connecting…</span><div id="meta"></div></div>
    <div id="help">Tab: cycle panel · Z trace · X power · R raw · C FFT · V features · ~/0–5 band · ↑/↓ cutaway</div>
    <!-- Asymmetry pane is reachable via Tab / the display dropdown. -->

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
